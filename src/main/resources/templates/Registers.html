<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
   		 --navy-light: #374151;
		-navy: #0f172a;
	    --accent: #0891b2;
	    --accent-dark: #0e7490;
    --text-light: #9ca3af;
    --border: #d1d5db;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f1f5f9, #ffffff);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 30px 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    inset: -50px;
    background-image:
      linear-gradient(rgba(31,41,55,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,41,55,.03) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: .8;
    z-index: 0;
    animation: gridDrift 24s linear infinite;
  }

  @keyframes gridDrift {
    from { transform: translate(0,0); }
    to { transform: translate(60px,60px); }
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
    animation: float 12s ease-in-out infinite;
  }

  .blob-1 {
    width: 250px;
    height: 250px;
    background: rgba(124,58,237,.08);
    top: -70px;
    right: -70px;
  }

  .blob-2 {
    width: 190px;
    height: 190px;
    background: rgba(16,185,129,.08);
    bottom: -50px;
    left: -50px;
    animation-delay: 1.5s;
  }

  @keyframes float {
    0%,100% {
      transform: translateY(0) translateX(0);
    }
    50% {
      transform: translateY(-20px) translateX(12px);
    }
  }

  .register-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 450px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 16px 35px rgba(0,0,0,.15);
    animation: cardEntrance .8s ease;
  }

  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(25px) scale(.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .register-header {
    background: linear-gradient(135deg, var(--navy), var(--accent));
    padding: 34px;
    text-align: center;
  }

  .register-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.5rem;
    animation: iconPop .6s ease;
  }

  @keyframes iconPop {
    from {
      opacity: 0;
      transform: scale(.5) rotate(-10deg);
    }
    to {
      opacity: 1;
      transform: scale(1) rotate(0);
    }
  }

  .register-header h3 {
    font-family: 'Poppins', sans-serif;
    color: #fff;
    font-size: 1.6rem;
    margin: 0;
  }

  .register-header p {
    color: #d1d5db;
    margin-top: 8px;
    font-size: .9rem;
  }

  .register-body {
    padding: 32px;
  }

  .field-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: .85rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .form-control-custom {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #f9fafb;
    font-size: .95rem;
    transition: .3s;
  }

  .form-control-custom::placeholder {
    color: #9ca3af;
  }

  .form-control-custom:focus {
    outline: none;
    background: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(124,58,237,.15);
    transform: translateY(-1px);
  }

  .field-group:focus-within label {
    color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: .3s;
  }

  .submit-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -80%;
    width: 40%;
    height: 100%;
    background: rgba(255,255,255,.3);
    transform: skewX(-20deg);
    transition: .6s;
  }

  .submit-btn:hover {
    background: var(--accent-dark);
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(109,40,217,.35);
  }

  .submit-btn:hover::before {
    left: 130%;
  }

  .login-link {
    text-align: center;
    margin-top: 20px;
    font-size: .9rem;
    color: var(--text-light);
  }

  .login-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    transition: .3s;
  }

  .login-link a:hover {
    color: var(--accent-dark);
    text-decoration: underline;
  }

  @media (max-width:480px) {
    .register-header,
    .register-body {
      padding: 24px;
    }

    .blob {
      display: none;
    }
  }
</style>
</head>

<body class="bg-light">

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="register-card">
  <div class="register-header">
    <div class="register-icon">👤</div>
    <h3>Create an account</h3>
    <p>Join TechVerse Gadgets to start shopping</p>
  </div>

  <div class="register-body">
    <form method="post" action="/register">

      <div class="field-group">
        <label for="name">Full Name</label>
        <input class="form-control-custom" id="name" name="name" placeholder="John Doe">
      </div>

      <div class="field-group">
        <label for="email">Email</label>
        <input class="form-control-custom" id="email" name="email" placeholder="you@example.com">
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input class="form-control-custom" id="password" name="password" type="password" placeholder="Create a password">
      </div>

      <div class="field-group">
        <label for="phone">Phone</label>
        <input class="form-control-custom" id="phone" name="phone" placeholder="+91 (944) 000-0000">
      </div>

      <button class="submit-btn" type="submit">Register</button>

    </form>

    <p class="login-link">
      Already have an account? <a href="/login">Login</a>
    </p>
  </div>
</div>

</body>
</html>
