<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-light: #374151;
	--navy: #0f172a;
	    --accent: #0891b2;
	    --accent-dark: #0e7490;
    --success: #10b981;
    --success-dark: #059669;
    --danger: #ef4444;
    --danger-dark: #dc2626;
    --text-light: #9ca3af;
    --border: #d1d5db;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f1f5f9, #ffffff);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    inset: -50px;
    background-image:
      linear-gradient(rgba(31, 41, 55, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31, 41, 55, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridDrift 24s linear infinite;
    z-index: 0;
    opacity: .8;
  }

  @keyframes gridDrift {
    from { transform: translate(0,0); }
    to { transform: translate(60px,60px); }
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
    animation: float 12s ease-in-out infinite;
  }

  .blob-1 {
    width: 260px;
    height: 260px;
    background: rgba(124,58,237,.08);
    top: -90px;
    right: -70px;
  }

  .blob-2 {
    width: 180px;
    height: 180px;
    background: rgba(16,185,129,.08);
    bottom: -50px;
    left: -50px;
    animation-delay: 1.5s;
  }

  @keyframes float {
    0%,100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-18px) translateX(12px); }
  }

  .top-bar {
    position: relative;
    z-index: 1;
    background: var(--navy);
    color: #d1d5db;
    font-size: .82rem;
    padding: 10px 0;
    text-align: center;
    letter-spacing: .05em;
  }

  .dashboard-header {
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, var(--navy), var(--accent));
    padding: 55px 20px 80px;
    text-align: center;
  }

  .eyebrow {
    display: inline-block;
    color: #fff;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 5px 14px;
    border-radius: 25px;
    margin-bottom: 18px;
    animation: fadeUp .6s ease;
  }

  .dashboard-header h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 2.1rem;
    color: #fff;
    margin: 0;
    animation: fadeUp .7s ease;
  }

  .dashboard-header h2 .wave {
    display: inline-block;
    animation: wave 2.5s infinite;
    transform-origin: 70% 70%;
  }

  @keyframes wave {
    0%,100% { transform: rotate(0deg); }
    20% { transform: rotate(12deg); }
    40% { transform: rotate(-8deg); }
    60% { transform: rotate(10deg); }
  }

  .dashboard-header p {
    color: #d1d5db;
    margin-top: 10px;
    font-size: .95rem;
    animation: fadeUp .8s ease;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: -50px auto 40px;
    padding: 0 20px;
  }

  .action-panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,.15);
    padding: 34px;
    animation: cardEntrance .8s ease;
  }

  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(25px) scale(.97);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .action-panel h6 {
    font-size: .78rem;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 20px;
  }

  .action-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 16px;
  }

  .action-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    padding: 24px 14px;
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: .3s;
  }

  .action-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(0,0,0,.12);
  }

  .action-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 1.4rem;
    transition: .3s;
  }

  .action-card:hover .action-icon {
    transform: rotate(8deg) scale(1.08);
  }

  .icon-products {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
  }

  .icon-add {
    background: linear-gradient(135deg, #10b981, #059669);
  }

  .icon-logout {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }

  .action-card span.label {
    font-size: .9rem;
    font-weight: 600;
    color: var(--navy);
  }

  .card-products:hover {
    border-color: rgba(124,58,237,.4);
  }

  .card-add:hover {
    border-color: rgba(16,185,129,.4);
  }

  .card-logout:hover {
    border-color: rgba(239,68,68,.4);
  }

  @media (max-width:576px) {
    .action-grid {
      grid-template-columns: 1fr;
    }

    .dashboard-header h2 {
      font-size: 1.7rem;
    }

    .blob {
      display: none;
    }
  }
</style>
</head>

<body>

<!-- NAVBAR
<div th:replace="navbar :: navbar"></div>-->

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="top-bar">TechVerse Gadgets &nbsp;|&nbsp; Admin Dashboard</div>

<div class="dashboard-header">
    <span class="eyebrow">Dashboard</span>
    <h2>Welcome, <span th:text="${user.name}"></span> <span class="wave">👋</span></h2>
    <p>Manage your catalog and account from one place.</p>
</div>

<div class="container">
    <div class="action-panel">
        <h6>Quick Actions</h6>
        <div class="action-grid">

            <a href="/products" class="action-card card-products">
                <div class="action-icon icon-products">🛒</div>
                <span class="label">View Products</span>
            </a>

            <a href="/add-product" class="action-card card-add">
                <div class="action-icon icon-add">➕</div>
                <span class="label">Add Product</span>
            </a>

            <a href="/logout" class="action-card card-logout">
                <div class="action-icon icon-logout">🚪</div>
                <span class="label">Logout</span>
            </a>

        </div>
    </div>
</div>

</body>
</html>
